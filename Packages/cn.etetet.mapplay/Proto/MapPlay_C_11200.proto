syntax = "proto3";
package ET;


// ResponseType G2C_EnterMap
message C2G_EnterMap // ISessionRequest
{
	int32 RpcId = 1;
}

message G2C_EnterMap // ISessionResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	/// 自己的UnitId
	int64 MyId = 4;
}

message PetInfo
{
	int64 OwnerId = 1;
}

message UnitInfo
{
	int64 UnitId = 1;
	int32 ConfigId = 2;
	int32 Type = 3;
	Unity.Mathematics.float3 Position = 4;
	Unity.Mathematics.float3 Forward = 5;
	map<int32, int64> KV = 6;
	MoveInfo MoveInfo = 7;
	PetInfo PetInfo = 8;
}

message M2C_CreateUnits // ICurrentMessage
{
	repeated UnitInfo Units = 1;
}

message M2C_CreateMyUnit // ICurrentMessage
{
	UnitInfo Unit = 1;
}

message M2C_StartSceneChange // IMessage
{
	int64 SceneId = 1;
	string SceneName = 2;
}

message M2C_RemoveUnits // ICurrentMessage
{
	repeated int64 Units = 1;
}

message M2C_Error // IMessage
{
	int32 Error = 1;
	repeated string Values = 2;
}

message M2C_NumericChange // ICurrentMessage
{
	int64 UnitId = 1;
	int32 NumericType = 2;
	int64 Value = 3;
}

// ResponseType M2C_TransferMap
message C2M_TransferMap // ILocationRequest
{
	int32 RpcId = 1;
}

message M2C_TransferMap // ILocationResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
}

message C2M_PetAttack // ILocationMessage
{
	int32 RpcId = 1;
	int64 UnitId = 2;
}
