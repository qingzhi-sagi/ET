// ResponseType AssetReadTextResponse
message AssetReadTextRequest // IRequest
{
	int32 RpcId = 1;
	string AssetPath = 2;
	int32 StartLine = 3;
	int32 MaxLines = 4;
	int32 MaxChars = 5;
}

message AssetReadTextResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	string AssetPath = 4;
	int32 TotalLines = 5;
	int32 ReturnedLineStart = 6;
	int32 ReturnedLineEnd = 7;
	int32 ReturnedLineCount = 8;
	bool Truncated = 9;
	string Content = 10;
}

// ResponseType SceneGetHierarchyResponse
message SceneGetHierarchyRequest // IRequest
