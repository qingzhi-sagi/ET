}

// ResponseType RegenProjectResponse
message RegenProject // IRequest
{
	int32 RpcId = 1;
}

message RegenProjectResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
}

message ErrorResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	string Command = 4;
}

// ResponseType RefreshResponse
message Refresh // IRequest
{
	int32 RpcId = 1;
}

message RefreshResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
}

// ResponseType TestEchoResponse
message TestEcho // IRequest
{
	int32 RpcId = 1;
	string Text = 2;
}

message TestEchoResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	string Text = 4;
	int64 HandledAt = 5;
	string Handler = 6;
}

message BridgeVector2
{
	float X = 1;
	float Y = 2;
}

message BridgeVector3
{
	float X = 1;
	float Y = 2;
	float Z = 3;
}

message BridgeQuaternion
{
	float X = 1;
	float Y = 2;
	float Z = 3;
	float W = 4;
}

message BridgeTransformInfo
{
	BridgeVector3 LocalPosition = 1;
	BridgeVector3 LocalEulerAngles = 2;
	BridgeQuaternion LocalRotation = 3;
	BridgeVector3 LocalScale = 4;
	string ParentPath = 5;
	int32 SiblingIndex = 6;
	BridgeVector3 Position = 7;
	BridgeVector3 EulerAngles = 8;
	int32 ChildCount = 9;
}

message BridgeObjectInfo
{
	string Name = 1;
	string Path = 2;
	int32 InstanceId = 3;
	bool ActiveSelf = 4;
	bool ActiveInHierarchy = 5;
	string Tag = 6;
	string LayerName = 7;
	int32 Layer = 8;
	BridgeTransformInfo Transform = 9;
	repeated BridgeComponentInfo Components = 10;
}

message BridgeAssetInfo
{
	string AssetPath = 1;
	string Guid = 2;
	string TypeName = 3;
	string Name = 4;
	string Extension = 5;
	int64 FileSize = 6;
	int32 InstanceId = 7;
}

message BridgeSceneNode
{
	BridgeObjectInfo Object = 1;
	repeated BridgeSceneNode Children = 2;
}

message BridgeComponentInfo
{
	string TypeName = 1;
	string FullTypeName = 2;
	int32 ComponentIndex = 3;
	int32 InstanceId = 4;
	bool Enabled = 5;
}

message BridgePropertyInfo
{
	string Name = 1;
	string DisplayName = 2;
	string Type = 3;
	string StringValue = 4;
	int32 IntValue = 5;
	float FloatValue = 6;
	bool BoolValue = 7;
	BridgeVector2 Vector2Value = 8;
	BridgeVector3 Vector3Value = 9;
	string ObjectReferencePath = 10;
	string ObjectReferenceType = 11;
	bool IsArray = 12;
	bool IsEditable = 13;
	string PropertyPath = 14;
	bool IsExpanded = 15;
	bool HasChildren = 16;
	int32 Depth = 17;
}

message BridgeConsoleLog
{
	string LogType = 1;
	string Message = 2;
	string StackTrace = 3;
	string Time = 4;
}

message BridgeGameViewResolution
{
	int32 Width = 1;
	int32 Height = 2;
	string Label = 3;
	bool IsCurrent = 4;
}

message BridgeScreenshotInfo
{
	string Path = 1;
	string FileName = 2;
	int32 Width = 3;
	int32 Height = 4;
	int64 FileSize = 5;
	string MediaType = 6;
}

message BridgeBatchStepResult
{
	string Name = 1;
	string Command = 2;
	int32 Error = 3;
	string Message = 4;
}

message BridgeTestResult
{
	string Name = 1;
	string FullName = 2;
	bool Passed = 3;
	int32 Error = 4;
	string Message = 5;
	int64 DurationMs = 6;
}

// ResponseType AssetSearchResponse
message AssetSearchRequest // IRequest
{
	int32 RpcId = 1;
	string Mode = 2;
	string Filter = 3;
	string Keyword = 4;
	repeated string SearchInFolders = 5;
	int32 MaxResults = 6;
	string Format = 7;
}

message AssetSearchResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	repeated BridgeAssetInfo Assets = 4;
	repeated string Paths = 5;
	string Mode = 6;
	string Filter = 7;
	int32 TotalFound = 8;
	int32 Returned = 9;
}

// ResponseType AssetFindResponse
message AssetFindRequest // IRequest
{
	int32 RpcId = 1;
	string Filter = 2;
	repeated string SearchInFolders = 3;
	int32 MaxResults = 4;
	string Format = 5;
}

message AssetFindResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	repeated BridgeAssetInfo Assets = 4;
	repeated string Paths = 5;
	string Filter = 6;
	int32 TotalFound = 7;
	int32 Returned = 8;
}

// ResponseType AssetGetPathResponse
message AssetGetPathRequest // IRequest
{
	int32 RpcId = 1;
