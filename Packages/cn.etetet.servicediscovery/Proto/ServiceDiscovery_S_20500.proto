syntax = "proto3";

package ET;

// ResponseType ServiceRegisterResponse
message ServiceRegisterRequest // IRequest
{
	int32 RpcId = 1;
	string SceneName = 2;
	ActorId ActorId = 3;
	StringKV Metadata = 4; // new()
}

message ServiceRegisterResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
}

// ResponseType ServiceUnregisterResponse
message ServiceUnregisterRequest // IRequest
{
	int32 RpcId = 1;
	string SceneName = 2;
}

message ServiceUnregisterResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
}

// ResponseType ServiceHeartbeatResponse
message ServiceHeartbeatRequest // IRequest
{
	int32 RpcId = 1;
	string SceneName = 2;
	ActorId AgentActorId = 3;
}

message ServiceHeartbeatResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
}

// ResponseType ServiceAgentRegisterResponse
message ServiceAgentRegisterRequest // IRequest
{
	int32 RpcId = 1;
	ActorId AgentActorId = 2;
	repeated ServiceInfoProto LocalServices = 3;
}

message ServiceAgentRegisterResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	repeated ServiceInfoProto Services = 4;
}

// ResponseType ServiceQueryResponse
message ServiceQueryRequest // IRequest
{
	int32 RpcId = 1;
	StringKV Filter = 2; // new()
}

message ServiceQueryResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	repeated ServiceInfoProto Services = 4;
}

// ResponseType ServiceSubscribeResponse
message ServiceSubscribeRequest // IRequest
{
	int32 RpcId = 1;
	string SceneName = 2;
	string FilterName = 3;
	StringKV FilterMetadata = 4; // new()
	ActorId SubscriberActorId = 5;
}

message ServiceSubscribeResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
	repeated ServiceInfoProto Services = 4;
}

// ResponseType ServiceUnsubscribeResponse
message ServiceUnsubscribeRequest // IRequest
{
	int32 RpcId = 1;
	string SceneName = 2;
}

message ServiceUnsubscribeResponse // IResponse
{
	int32 RpcId = 1;
	int32 Error = 2;
	string Message = 3;
}

// 服务变更通知消息
message ServiceChangeNotification // IMessage
{
	int32 ChangeType = 1; // 1=添加, 2=删除, 3=主机切换
	int64 Epoch = 2;
	ActorId MasterActorId = 3;
	repeated ServiceInfoProto ServiceInfo = 4;
}

// Proxy销毁时单向通知Agent执行注销
message ServiceProxyDestroyUnregisterMessage // IMessage
{
	string SceneName = 1;
}

// 服务信息Proto定义
message ServiceInfoProto
{
	string SceneName = 1;
	ActorId ActorId = 3;
	StringKV Metadata = 5; // new()
}
